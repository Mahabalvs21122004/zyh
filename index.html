<!DOCTYPE html>
<html>
    <head>
        <title>PRICING TABLES</title>
        <meta charset="UTF-8">
    </head>
    <style>
    .container
    {
        width:100%;
    }
    .card
    {
        width:35%;
        background-color: cadetblue;
        height:35%; 
        text-align: center;  
        border-radius: 20px;
        
    }
    .left
    {
        float:left;
    }
    .right
    {
        float:right;
    }
    .card>h1
    {
        font-size:2em;
    }
    button
    {
        width:135px;
        height:50px;
        border-radius:20px;
        
    }
    @media(max-width:768px)
    {
        h1
        {
            width:100%;
        }
        .card
        {
            display:block;
            text-align:justify;
            margin-bottom: 20px;
            width:100%;
            text-align: center;
            border-radius: 20px;
        }
        .left,.right
        {
            float: none;
            width:100%;
        }
    }


    </style>
    <body>
        <div class="container">
            <div class="card left">
                <h1>HYDROXYL PEROXIDE</h1>
                <p>RS 500</p>
                <button>ADD TO CART</button>
            </div>
            <div class="card right">
                <h1>AZITHROMYCIN</h1>
                <p>RS 350</p>
                <button>ADD TO CART</button>
            </div>
        </div>
    </body>
</html>
